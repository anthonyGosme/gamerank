<!--meta:{"title":"Tic Tac Toe","category":"strategy","short":"Three in a row against an AI that never misses an open win.","color":"#1e3a5f"}-->
<h1>Tic Tac Toe</h1>
<div class="hud"><span>You <b id="wins">0</b></span><span>AI <b id="losses">0</b></span><span>Draws <b id="draws">0</b></span></div>
<div class="stage"><div id="board" style="display:grid;grid-template-columns:repeat(3,4.5rem);gap:.4rem"></div></div>
<p class="msg" id="msg">You are ✕ — your move.</p>
<script>
  const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const board = document.getElementById('board');
  let cells = [], grid = Array(9).fill(''), over = false;
  let wins = 0, losses = 0, draws = 0;

  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('button');
    cell.style.cssText = 'width:4.5rem;height:4.5rem;font-size:2rem;background:rgba(0,0,0,.28);border-radius:.5rem;padding:0';
    cell.addEventListener('click', () => play(i));
    cells.push(cell);
    board.append(cell);
  }
  function winner(state) {
    for (const [a, b, c] of LINES) {
      if (state[a] && state[a] === state[b] && state[b] === state[c]) return state[a];
    }
    return state.includes('') ? null : 'draw';
  }
  function render() {
    cells.forEach((cell, i) => {
      cell.textContent = grid[i];
      cell.style.color = grid[i] === '✕' ? '#f59e0b' : '#10b981';
    });
  }
  function finish(result) {
    over = true;
    if (result === '✕') { document.getElementById('wins').textContent = ++wins; document.getElementById('msg').textContent = 'You win! Click any cell for a new game.'; }
    else if (result === '◯') { document.getElementById('losses').textContent = ++losses; document.getElementById('msg').textContent = 'The AI wins. Click any cell to try again.'; }
    else { document.getElementById('draws').textContent = ++draws; document.getElementById('msg').textContent = 'Draw. Click any cell to replay.'; }
  }
  // IA simple : gagner si possible, sinon bloquer, sinon centre / coin / au hasard.
  function aiMove() {
    const free = grid.map((v, i) => (v ? null : i)).filter((i) => i !== null);
    for (const mark of ['◯', '✕']) {
      for (const i of free) {
        const test = [...grid]; test[i] = mark;
        if (winner(test) === mark) return i;
      }
    }
    if (grid[4] === '') return 4;
    const corners = [0, 2, 6, 8].filter((i) => grid[i] === '');
    if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
    return free[Math.floor(Math.random() * free.length)];
  }
  function play(index) {
    if (over) { grid = Array(9).fill(''); over = false; render(); document.getElementById('msg').textContent = 'You are ✕ — your move.'; return; }
    if (grid[index]) return;
    grid[index] = '✕'; render();
    let result = winner(grid);
    if (result) return finish(result);
    grid[aiMove()] = '◯'; render();
    result = winner(grid);
    if (result) finish(result);
  }
  render();
</script>
