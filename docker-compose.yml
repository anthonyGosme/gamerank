services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gamerank
      POSTGRES_PASSWORD: gamerank
      POSTGRES_DB: gamerank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_USER: gamerank
      CLICKHOUSE_PASSWORD: gamerank
      CLICKHOUSE_DB: gamerank
    ports:
      - "8123:8123"
    volumes:
      - chdata:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # Capture les emails en dev : UI sur http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  chdata:
